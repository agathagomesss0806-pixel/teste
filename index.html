<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Fashion</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#000;
color:white;
padding:20px;
text-align:center;
}

.produtos{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.produto{
background:white;
width:250px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
text-align:center;
}

.produto img{
width:100%;
border-radius:10px;
}

button{
background:black;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

#carrinho{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

.finalizar{
background:green;
}
</style>
</head>
<body>

<header>
<h1>Loja Fashion</h1>
<p>Compre suas roupas favoritas</p>
</header>

<div class="produtos">

<div class="produto">
<img src="https://via.placeholder.com/250x300">
<h3>Camiseta Básica</h3>
<p>R$ 49,90</p>
<button onclick="adicionar('Camiseta Básica',49.90)">
Adicionar
</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/250x300">
<h3>Calça Jeans</h3>
<p>R$ 129,90</p>
<button onclick="adicionar('Calça Jeans',129.90)">
Adicionar
</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/250x300">
<h3>Moletom</h3>
<p>R$ 99,90</p>
<button onclick="adicionar('Moletom',99.90)">
Adicionar
</button>
</div>

</div>

<div id="carrinho">
<h2>Carrinho</h2>
<ul id="lista"></ul>

<h3>Total: R$ <span id="total">0.00</span></h3>

<button class="finalizar" onclick="finalizarCompra()">
Finalizar Compra
</button>
</div>

<script>
let carrinho = [];
let total = 0;

function adicionar(nome, preco){
carrinho.push({nome, preco});
total += preco;

atualizarCarrinho();
}

function atualizarCarrinho(){
const lista = document.getElementById("lista");
lista.innerHTML = "";

carrinho.forEach(item=>{
let li = document.createElement("li");
li.textContent =
item.nome + " - R$ " + item.preco.toFixed(2);
lista.appendChild(li);
});

document.getElementById("total")
.textContent = total.toFixed(2);
}

function finalizarCompra(){

let mensagem = "Olá! Quero comprar:%0A";

carrinho.forEach(item=>{
mensagem += "- " + item.nome + "%0A";
});

mensagem += "%0ATotal: R$ " + total.toFixed(2);

window.open(
"https://wa.me/33988530251?text=" + mensagem,
"_blank"
);

}
</script>

</body>
</html>
